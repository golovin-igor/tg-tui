name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [linux-x64, osx-x64, osx-arm64, win-x64]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish ${{ matrix.rid }}
        run: >
          dotnet publish src/TgTui
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -o artifacts/${{ matrix.rid }}

      - name: Package archive
        run: |
          mkdir -p dist
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            (cd artifacts/${{ matrix.rid }} && zip -r ../../dist/tg-tui-${{ matrix.rid }}.zip .)
          else
            tar -czf dist/tg-tui-${{ matrix.rid }}.tar.gz -C artifacts/${{ matrix.rid }} .
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: tg-tui-${{ matrix.rid }}
          path: dist/*

  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
